          path: ${{ steps.build_offline_bundle.outputs.bundle_path }}

      - name: Upload release asset
        if: github.event_name == 'release'
        # v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
